<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... - Business Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BI Navigation -->
  <nav class="bi-navbar">
    <div class="bi-nav-inner">
      <a href="/insights.html" class="bi-nav-logo">
        <div class="bi-logo-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
          </svg>
        </div>
        <span class="bi-logo-text">Business Insights</span>
      </a>
      <div class="notif-wrapper" id="notifWrapper">
        <button class="notif-bell" id="notifBell" aria-label="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
        <div class="notif-panel" id="notifPanel" style="display:none">
          <div class="notif-panel-header">
            <span class="notif-panel-title">Notifications</span>
            <button class="notif-mark-all" id="notifMarkAll">Mark all read</button>
          </div>
          <div class="notif-panel-body" id="notifPanelBody">
            <div class="notif-empty">No notifications yet</div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Reader -->
  <article class="insight-reader">
    <a href="/insights.html#episodes" class="insight-back">&larr; Back to Episodes</a>
    <div id="insightMeta" class="insight-meta"></div>
    <div id="insightContent" class="insight-content">
      <div class="insights-loading">Loading breakdown...</div>
    </div>
    <nav id="insightNav" class="insight-nav"></nav>
  </article>

  <!-- Footer -->
  <footer class="bi-footer">
    <a href="/" class="bi-footer-link">&larr; Back to LizHub</a>
    <span class="bi-footer-sep">&middot;</span>
    <span class="bi-footer-text">Powered by The Best One Yet podcast</span>
  </footer>

  <script src="notifications.js"></script>
  <script src="insight.js"></script>
</body>
</html>

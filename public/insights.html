<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BI Navigation -->
  <nav class="bi-navbar">
    <div class="bi-nav-inner">
      <a href="/insights.html" class="bi-nav-logo">
        <div class="bi-logo-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
          </svg>
        </div>
        <span class="bi-logo-text">Business Insights</span>
      </a>
    </div>
  </nav>

  <!-- Dashboard — Rails View -->
  <main id="dashboard" class="bi-dashboard">
    <div class="bi-dashboard-inner">
      <div class="insights-loading">Loading insights...</div>
    </div>
  </main>

  <!-- Grid View (hidden by default) -->
  <main id="grid-view" class="bi-grid-view" style="display:none">
    <div class="grid-header">
      <button class="grid-back" id="gridBack">&larr; Back</button>
      <div class="grid-search-wrap">
        <svg class="grid-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="grid-search" id="gridSearch" placeholder="Search..." />
      </div>
    </div>
    <h1 class="grid-title" id="gridTitle"></h1>
    <div class="grid-container" id="gridContainer"></div>
  </main>

  <!-- Footer -->
  <footer class="bi-footer">
    <a href="/" class="bi-footer-link">&larr; Back to LizHub</a>
    <span class="bi-footer-sep">&middot;</span>
    <span class="bi-footer-text">Powered by The Best One Yet podcast</span>
  </footer>

  <script src="insights.js"></script>
</body>
</html>

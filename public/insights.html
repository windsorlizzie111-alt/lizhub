<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BI Navigation -->
  <nav class="bi-navbar">
    <div class="bi-nav-inner">
      <a href="/insights.html" class="bi-nav-logo">
        <div class="bi-logo-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
          </svg>
        </div>
        <span class="bi-logo-text">Business Insights</span>
      </a>
      <div class="bi-nav-tabs">
        <a href="#learnings" class="bi-nav-tab" data-tab="learnings">Learnings</a>
        <a href="#episodes" class="bi-nav-tab" data-tab="episodes">Episodes</a>
      </div>
    </div>
  </nav>

  <!-- Tabs Content -->
  <main class="bi-main">

    <!-- Learnings Tab -->
    <section id="tab-learnings" class="bi-tab-content">
      <div class="bi-tab-header">
        <h1 class="bi-tab-title">Learnings</h1>
        <p class="bi-tab-subtitle">Every business lesson extracted and organized by theme.</p>
      </div>
      <div class="learnings-filters">
        <div class="filter-chips" id="filterChips"></div>
        <div class="learnings-count" id="learningsCount"></div>
      </div>
      <div class="bi-content-area">
        <div id="learningsList" class="learnings-list">
          <div class="insights-loading">Loading learnings...</div>
        </div>
      </div>
    </section>

    <!-- Episodes Tab -->
    <section id="tab-episodes" class="bi-tab-content" style="display:none">
      <div class="bi-tab-header">
        <h1 class="bi-tab-title">Episodes</h1>
        <p class="bi-tab-subtitle">Daily podcast breakdowns from The Best One Yet.</p>
      </div>
      <div class="bi-content-area">
        <div id="insightsList" class="insights-list">
          <div class="insights-loading">Loading episodes...</div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="bi-footer">
    <a href="/" class="bi-footer-link">&larr; Back to LizHub</a>
    <span class="bi-footer-sep">&middot;</span>
    <span class="bi-footer-text">Powered by The Best One Yet podcast</span>
  </footer>

  <script src="insights.js"></script>
</body>
</html>

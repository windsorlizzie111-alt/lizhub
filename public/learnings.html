<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnings - LizHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo" style="text-decoration:none;color:inherit">
        <div class="logo-mark">L</div>
        <span class="logo-text">LizHub</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">Tools</a>
        <a href="/insights.html" class="nav-link">Episodes</a>
        <a href="/learnings.html" class="nav-link active">Learnings</a>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <section class="learnings-header">
    <div class="learnings-header-glow"></div>
    <div class="learnings-header-content">
      <div class="learnings-icon-wrap">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <h1 class="learnings-title">Learnings</h1>
      <p class="learnings-subtitle">Every business lesson extracted and organized by theme. Skim, absorb, apply.</p>
    </div>
  </section>

  <!-- Filter Chips -->
  <section class="learnings-filters">
    <div class="filter-chips" id="filterChips"></div>
    <div class="learnings-count" id="learningsCount"></div>
  </section>

  <!-- Learnings List -->
  <section class="learnings-section">
    <div id="learningsList" class="learnings-list">
      <div class="insights-loading">Loading learnings...</div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>Built with focus &middot; LizHub</p>
  </footer>

  <script src="learnings.js"></script>
</body>
</html>
